<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#FFF8EC">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Jot">
<link rel="manifest" href="./manifest.json">
<link rel="apple-touch-icon" href="./icons/icon-192.png">
<title>Jot</title>
<style>
  :root{
    --bg:#FFF8EC; --paper:#FFFDF8; --ink:#2A2138; --ink-soft:#8B8296; --line:#F0E4CE;
    --reminder:#FF7A45; --reminder-bg:#FFE9DA; --reminder-ink:#B8481A;
    --idea:#7C5CFC; --idea-bg:#ECE5FF; --idea-ink:#5B3DD6;
    --note:#12AFA0; --note-bg:#DBF6F1; --note-ink:#0C7E73;
    --grad1:#FF6B4A; --grad2:#8B5CF6;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
  html,body{height:100%;overflow:hidden;overscroll-behavior:none}
  body{
    background:
      radial-gradient(50% 30% at 10% 22%, rgba(255,107,74,.13), transparent 68%),
      radial-gradient(46% 32% at 100% 28%, rgba(139,92,246,.12), transparent 68%),
      radial-gradient(60% 40% at 50% 115%, rgba(18,175,160,.08), transparent 60%),
      var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,sans-serif;-webkit-font-smoothing:antialiased;
    max-width:560px;margin:0 auto;position:fixed;inset:0;overflow:hidden;overscroll-behavior:none}
  button{font-family:inherit;cursor:pointer;border:0;background:none;color:inherit}
  textarea,input{font-family:inherit}
  ::selection{background:var(--grad2);color:#fff}

  /* floating page switcher */
  .pageswitch{position:fixed;top:calc(16px + env(safe-area-inset-top));left:50%;transform:translateX(-50%);
    z-index:30;display:flex;gap:2px;background:var(--paper);border:1px solid var(--line);border-radius:999px;
    padding:4px;box-shadow:0 8px 24px -8px rgba(42,33,56,.18)}
  .pswbtn{width:42px;height:38px;border-radius:999px;display:flex;align-items:center;justify-content:center;
    color:var(--ink-soft);transition:background .2s,color .2s}
  .pswbtn svg{width:18px;height:18px}
  .pswbtn.on{color:#fff;background:linear-gradient(120deg,var(--grad1),var(--grad2))}

  .page{position:fixed;inset:0;display:flex;flex-direction:column;opacity:1;transition:opacity .18s ease}
  .page.hidden{opacity:0;pointer-events:none}

  /* ---- capture page ---- */
  .page-capture{align-items:center;justify-content:center;padding:0 28px;touch-action:none;overscroll-behavior:none}
  .capture-wrap{width:100%;max-width:420px;display:flex;flex-direction:column;align-items:center;text-align:center}
  .prompt{font-size:25px;font-weight:800;letter-spacing:-.3px;color:var(--ink);margin-bottom:20px;line-height:1.3;
    background:linear-gradient(120deg,var(--grad1),var(--grad2));-webkit-background-clip:text;background-clip:text;color:transparent}
  .captureInput{width:100%;background:transparent;border:0;border-bottom:2.5px solid var(--line);color:var(--ink);
    font-size:21px;font-weight:600;text-align:left;padding:8px 4px 14px;resize:none;line-height:1.4;max-height:180px}
  .captureInput::placeholder{color:var(--ink-soft);font-weight:500}
  .captureInput:focus{outline:0;border-color:var(--grad2)}
  .sendfab{margin-top:22px;width:56px;height:56px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    background:linear-gradient(120deg,var(--grad1),var(--grad2));color:#fff;opacity:0;transform:scale(.7);
    transition:opacity .2s,transform .2s;box-shadow:0 10px 26px -8px rgba(139,92,246,.55)}
  .sendfab.show{opacity:1;transform:scale(1)}
  .sendfab svg{width:22px;height:22px}
  .hint{margin-top:34px;font-size:12px;color:var(--ink-soft);font-weight:600}

  .toast{position:fixed;bottom:calc(30px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%) translateY(14px);
    z-index:40;display:flex;align-items:center;gap:8px;background:var(--ink);color:#fff;font-weight:700;font-size:13.5px;
    padding:11px 18px;border-radius:999px;box-shadow:0 14px 30px -10px rgba(42,33,56,.5);opacity:0;pointer-events:none;
    transition:opacity .2s,transform .2s;white-space:nowrap}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);pointer-events:auto}
  .toast .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
  .toast .retag{color:rgba(255,255,255,.6);font-weight:600;margin-left:4px}

  /* ---- log page ---- */
  .page-log{padding-top:calc(68px + env(safe-area-inset-top))}
  .logheader{padding:0 18px 8px;display:flex;align-items:center;gap:10px;flex-shrink:0}
  .logo{font-weight:900;font-size:20px;letter-spacing:-.5px;background:linear-gradient(120deg,var(--grad1),var(--grad2));
    -webkit-background-clip:text;background-clip:text;color:transparent}
  .logheader .spacer{flex:1}
  .iconbtn{width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--ink-soft);background:var(--paper);border:1px solid var(--line)}
  .iconbtn.on{color:var(--note-ink);border-color:var(--note)}
  .iconbtn svg{width:16px;height:16px}

  .searchwrap{padding:0 18px 10px;flex-shrink:0}
  .searchwrap input{width:100%;background:var(--paper);border:1px solid var(--line);color:var(--ink);font-size:14px;
    padding:10px 13px;border-radius:12px}
  .searchwrap input::placeholder{color:var(--ink-soft)}
  .searchwrap input:focus{outline:0;border-color:var(--grad2)}

  .filters{display:flex;gap:7px;padding:0 18px 12px;flex-shrink:0;overflow-x:auto}
  .chip{flex-shrink:0;display:flex;align-items:center;gap:6px;background:var(--paper);border:1.5px solid var(--line);
    border-radius:999px;padding:7px 13px;font-weight:700;font-size:12.5px;color:var(--ink-soft)}
  .chip .n{color:var(--ink-soft);font-size:11px;opacity:.7}
  .chip.on{color:var(--ink);border-color:var(--c,var(--grad2));background:var(--cbg,#fff)}

  main{flex:1;overflow-y:auto;padding:0 18px calc(24px + env(safe-area-inset-bottom));display:flex;flex-direction:column;
    gap:10px;overscroll-behavior:contain}
  main>*{flex-shrink:0}
  .empty{color:var(--ink-soft);text-align:center;padding:60px 20px;font-size:13.5px;line-height:1.6}
  .empty b{color:var(--ink);display:block;font-size:16px;margin-bottom:6px;font-weight:800}

  .grouphead{font-size:11.5px;font-weight:800;text-transform:uppercase;letter-spacing:.5px;color:var(--ink-soft);
    padding:10px 4px 2px}
  .grouphead:first-child{padding-top:0}

  .swipe{position:relative;border-radius:16px;overflow:hidden;isolation:isolate}
  .swipe-del{position:absolute;inset:0;background:#E8503A;border-radius:16px;display:flex;align-items:center;justify-content:flex-end;
    padding-right:26px;color:#fff}
  .swipe-del svg{width:18px;height:18px}
  .item{display:flex;align-items:flex-start;gap:10px;width:100%;background:var(--cbg,var(--paper));border:1px solid var(--line);
    border-radius:16px;padding:13px 13px;position:relative;touch-action:pan-y}
  .item .tag{width:24px;height:24px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:13px;
    flex-shrink:0;margin-top:1px;background:rgba(255,255,255,.6)}
  .item .body{flex:1;min-width:0}
  .item .txt{font-size:14.5px;font-weight:600;line-height:1.4;word-wrap:break-word;white-space:pre-wrap;color:var(--ink)}
  .item.done .txt{text-decoration:line-through;color:var(--ink-soft)}
  .item .edittxt{width:100%;background:transparent;border:0;border-bottom:1.5px solid var(--line);color:var(--ink);
    font-size:14.5px;font-weight:600;font-family:inherit;line-height:1.4;resize:none;padding:0 0 4px}
  .item .edittxt:focus{outline:0;border-color:var(--grad2)}
  .item .meta{font-size:11.5px;color:var(--ink-soft);margin-top:5px;font-weight:700}
  .item .due{display:inline-flex;align-items:center;gap:4px}
  .item .duebtn{display:block;text-align:left;width:100%}
  .item .duebtn:active{opacity:.6}
  .item .actions{display:flex;gap:4px;flex-shrink:0}
  .item .actions button{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;
    color:var(--ink-soft)}
  .item .actions button:active{background:rgba(0,0,0,.06)}
  .item .actions svg{width:14px;height:14px}

  .trashlink{display:block;text-align:center;padding:14px 0 4px;font-size:12px;font-weight:700;color:var(--ink-soft)}
  .trashitem{display:flex;align-items:center;gap:10px;padding:10px 0;border-top:1px solid var(--line)}
  .trashitem:first-child{border-top:0}
  .trashitem .txt{flex:1;font-size:13.5px;font-weight:600;color:var(--ink)}
  .trashitem .restore{font-size:12px;font-weight:800;color:var(--note-ink);flex-shrink:0}

  .modal-bg{position:fixed;inset:0;background:rgba(42,33,56,.35);display:flex;align-items:flex-end;justify-content:center;
    z-index:50;backdrop-filter:blur(2px)}
  .modal{width:100%;max-width:560px;background:var(--paper);border:1px solid var(--line);border-radius:22px 22px 0 0;
    padding:20px 18px calc(22px + env(safe-area-inset-bottom));max-height:80vh;overflow-y:auto}
  .modal h3{font-size:16px;margin-bottom:12px;color:var(--ink)}
  .modal p{font-size:12.5px;color:var(--ink-soft);line-height:1.55;margin-bottom:10px}
  .modal a{color:var(--idea-ink)}
  .field label{font-size:11px;font-weight:700;color:var(--ink-soft);display:block;margin-bottom:5px}
  .field input{width:100%;background:var(--bg);border:1.5px solid var(--line);color:var(--ink);font-size:14px;
    padding:11px 12px;border-radius:10px;font-family:monospace}
  .field input:focus{outline:0;border-color:var(--grad2)}
  .sync-status{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink-soft);margin:12px 0}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--ink-soft)}
  .dot.on{background:var(--note)}
  .dot.err{background:var(--reminder)}
  .sync-err{background:var(--reminder-bg);color:var(--reminder-ink);border:1px solid rgba(255,122,69,.3);border-radius:10px;
    padding:9px 11px;font-size:12px;margin-bottom:10px}
  .modal-actions{display:flex;gap:8px;margin-top:14px}
  .btn{flex:1;padding:12px;border-radius:12px;font-weight:800;font-size:14px;text-align:center}
  .btn.primary{background:linear-gradient(120deg,var(--grad1),var(--grad2));color:#fff}
  .btn.ghost{background:var(--bg);color:var(--ink-soft);border:1px solid var(--line)}
  .btn:disabled{opacity:.5}
  .closebar{width:36px;height:4px;border-radius:2px;background:var(--line);margin:0 auto 14px}
</style>
</head>
<body data-page="capture">

<nav class="pageswitch" id="pageSwitch">
  <button class="pswbtn" data-target="capture" title="Capture">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 20h9"/><path d="M16.5 3.5a2.12 2.12 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
  </button>
  <button class="pswbtn" data-target="log" title="Your jots">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><line x1="8" y1="6" x2="21" y2="6"/><line x1="8" y1="12" x2="21" y2="12"/><line x1="8" y1="18" x2="21" y2="18"/><line x1="3" y1="6" x2="3.01" y2="6"/><line x1="3" y1="12" x2="3.01" y2="12"/><line x1="3" y1="18" x2="3.01" y2="18"/></svg>
  </button>
</nav>

<section class="page page-capture" id="pageCapture">
  <div class="capture-wrap">
    <div class="prompt" id="promptText">What's on your mind?</div>
    <textarea id="captureInput" class="captureInput" rows="1" placeholder="Type here…" autocomplete="off" autocapitalize="sentences"></textarea>
    <button class="sendfab" id="sendFab" title="Save">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>
    </button>
    <div class="hint" id="hint">I'll figure out if it's a reminder, idea, or note</div>
  </div>
</section>

<section class="page page-log hidden" id="pageLog">
  <header class="logheader">
    <div class="logo">Jot</div>
    <div class="spacer"></div>
    <button class="iconbtn" id="syncBtn"></button>
  </header>
  <div class="searchwrap">
    <input type="text" id="search" placeholder="Search…" autocomplete="off">
  </div>
  <div class="filters" id="filters"></div>
  <main id="list"></main>
</section>

<div class="toast" id="toast"></div>

<script src="./classify.js"></script>
<script src="./sync.js"></script>
<script src="./push.js"></script>
<script>
(() => {
  const TYPES = {
    reminder: { label: 'Reminder', icon: '⏰', color: 'var(--reminder)', bg: 'var(--reminder-bg)', ink: 'var(--reminder-ink)' },
    idea:     { label: 'Idea',     icon: '💡', color: 'var(--idea)',     bg: 'var(--idea-bg)',     ink: 'var(--idea-ink)' },
    note:     { label: 'Note',     icon: '📝', color: 'var(--note)',    bg: 'var(--note-bg)',     ink: 'var(--note-ink)' },
  };
  const TYPE_ORDER = ['reminder', 'idea', 'note'];
  const STORE_KEY = 'jot:items';
  const TRASH_DAYS = 30;
  const PROMPTS_ANYTIME = [
    "What's on your mind?", "Jot something down…", "What are you thinking about?",
    "Quick thought?", "Got something to remember?", "Anything to capture?",
    "What do you want to remember later?", "Speak your mind.", "Drop a thought here.",
  ];
  const PROMPTS_MORNING = ["Good morning — what's on your mind?", "Start the day with a thought.", "Morning brain dump?"];
  const PROMPTS_EVENING = ["How'd today go?", "Evening thoughts?", "What's on your mind tonight?"];
  const PROMPTS_NIGHT = ["Still up? What's on your mind?", "Can't sleep? Jot it down.", "Late-night thought?"];

  function promptPool() {
    const h = new Date().getHours();
    if (h >= 22 || h < 5) return PROMPTS_NIGHT.concat(PROMPTS_ANYTIME);
    if (h >= 5 && h < 11) return PROMPTS_MORNING.concat(PROMPTS_ANYTIME);
    if (h >= 17 && h < 22) return PROMPTS_EVENING.concat(PROMPTS_ANYTIME);
    return PROMPTS_ANYTIME;
  }

  const load = () => { try { return JSON.parse(localStorage.getItem(STORE_KEY)) || []; } catch { return []; } };
  const save = (items) => {
    localStorage.setItem(STORE_KEY, JSON.stringify(items));
    window.JotSync && window.JotSync.markDirty();
  };

  let items = load();
  let filter = 'all';
  let query = '';
  let pendingType = null; // last classified type, awaiting toast auto-confirm
  let pendingId = null;
  let toastTimer = null;
  let editingId = null;
  let swipeOpenId = null;
  let swipeState = null;
  let deleteToastTimer = null;
  const timers = new Map();

  const $ = (sel) => document.querySelector(sel);
  const listEl = $('#list');
  const filtersEl = $('#filters');
  const input = $('#captureInput');
  const sendFab = $('#sendFab');
  const promptEl = $('#promptText');
  const searchEl = $('#search');
  const toastEl = $('#toast');

  function uid() { return Date.now().toString(36) + Math.random().toString(36).slice(2, 7); }

  function ago(iso) {
    const diff = Date.now() - new Date(iso).getTime();
    if (diff < 60000) return 'just now';
    if (diff < 3600000) return `${Math.floor(diff / 60000)}m ago`;
    if (diff < 86400000) return `${Math.floor(diff / 3600000)}h ago`;
    if (diff < 604800000) return `${Math.floor(diff / 86400000)}d ago`;
    return new Date(iso).toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  // ---------------- Capture page ----------------
  function rollPrompt() {
    const pool = promptPool();
    promptEl.textContent = pool[Math.floor(Math.random() * pool.length)];
  }

  function autoGrow() {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 180) + 'px';
  }

  function updateFab() {
    sendFab.classList.toggle('show', input.value.trim().length > 0);
  }

  function showToast(type, dueAt) {
    const t = TYPES[type];
    toastEl.innerHTML = `<span class="dot" style="background:${t.color}"></span><span>${t.icon} ${t.label}${dueAt ? ' · ' + window.JotEngine.formatDue(dueAt) : ''}</span><span class="retag">tap to change</span>`;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    toastTimer = setTimeout(() => { toastEl.classList.remove('show'); pendingId = null; }, 2600);
  }

  function cycleType() {
    if (!pendingId) return;
    const it = items.find((i) => i.id === pendingId);
    if (!it) return;
    const idx = TYPE_ORDER.indexOf(it.type);
    it.type = TYPE_ORDER[(idx + 1) % TYPE_ORDER.length];
    if (it.type !== 'reminder') {
      it.dueAt = null;
      const t = timers.get(it.id);
      if (t) { clearTimeout(t); timers.delete(it.id); }
    }
    save(items);
    showToast(it.type, it.dueAt);
    window.JotPush && window.JotPush.syncReminder(it);
    render();
  }

  function capture() {
    const text = input.value.trim();
    if (!text) return;
    const { type, dueAt } = window.JotEngine.classify(text);
    const item = { id: uid(), type, text, done: false, createdAt: new Date().toISOString(), dueAt, notified: false, deletedAt: null };
    items.push(item);
    save(items);
    input.value = '';
    autoGrow();
    updateFab();
    pendingId = item.id;
    showToast(type, dueAt);
    scheduleNotification(item);
    window.JotPush && window.JotPush.syncReminder(item);
    rollPrompt();
    render();
  }

  input.addEventListener('input', () => { autoGrow(); updateFab(); });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); capture(); }
  });
  sendFab.addEventListener('click', capture);
  toastEl.addEventListener('click', cycleType);

  // ---------------- Page switcher ----------------
  const pageSwitchEl = $('#pageSwitch');
  const pageCapture = $('#pageCapture');
  const pageLog = $('#pageLog');

  function goTo(page) {
    document.body.dataset.page = page;
    pageCapture.classList.toggle('hidden', page !== 'capture');
    pageLog.classList.toggle('hidden', page !== 'log');
    pageSwitchEl.querySelectorAll('.pswbtn').forEach((b) => b.classList.toggle('on', b.dataset.target === page));
    if (page === 'capture') { rollPrompt(); setTimeout(() => input.focus(), 50); }
    else { render(); }
  }
  pageSwitchEl.querySelectorAll('.pswbtn').forEach((b) => {
    b.addEventListener('click', () => goTo(b.dataset.target));
  });

  // ---------------- Log page ----------------
  function renderFilters() {
    const live = items.filter((i) => !i.deletedAt);
    const counts = { all: live.length, reminder: 0, idea: 0, note: 0 };
    live.forEach((i) => { counts[i.type] = (counts[i.type] || 0) + 1; });
    const chips = [{ key: 'all', label: 'All', icon: '', color: 'var(--grad2)', bg: '#fff' },
      ...TYPE_ORDER.map((key) => ({ key, label: TYPES[key].label, icon: TYPES[key].icon, color: TYPES[key].color, bg: TYPES[key].bg }))];
    filtersEl.innerHTML = chips.map((c) => `
      <button class="chip ${filter === c.key ? 'on' : ''}" data-filter="${c.key}" style="--c:${c.color};--cbg:${filter === c.key ? c.bg : 'var(--paper)'}">
        ${c.icon ? `<span>${c.icon}</span>` : ''}<span>${c.label}</span><span class="n">${counts[c.key] || 0}</span>
      </button>`).join('');
    filtersEl.querySelectorAll('.chip').forEach((btn) => {
      btn.addEventListener('click', () => { filter = btn.dataset.filter; render(); });
    });
  }

  function dayBucket(iso) {
    const d = new Date(iso);
    const now = new Date();
    const startOf = (dt) => new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()).getTime();
    const diffDays = Math.round((startOf(now) - startOf(d)) / 86400000);
    if (diffDays === 0) return 'Today';
    if (diffDays === 1) return 'Yesterday';
    if (diffDays > 1 && diffDays < 7) return 'This week';
    return 'Earlier';
  }

  function dueBucket(item) {
    if (item.done) return 'Done';
    if (!item.dueAt) return 'No due date';
    const d = new Date(item.dueAt);
    const now = new Date();
    const startOf = (dt) => new Date(dt.getFullYear(), dt.getMonth(), dt.getDate()).getTime();
    const diffDays = Math.round((startOf(d) - startOf(now)) / 86400000);
    if (diffDays <= 0) return 'Today';
    if (diffDays === 1) return 'Tomorrow';
    if (diffDays < 7) return 'This week';
    return 'Later';
  }

  function sortedGroups() {
    let shown = items.filter((i) => !i.deletedAt && (filter === 'all' || i.type === filter));
    if (query.trim()) {
      const q = query.trim().toLowerCase();
      shown = shown.filter((i) => i.text.toLowerCase().includes(q));
    }

    if (filter === 'reminder') {
      const order = ['Today', 'Tomorrow', 'This week', 'Later', 'No due date', 'Done'];
      const byGroup = {};
      shown.forEach((i) => { const g = dueBucket(i); (byGroup[g] = byGroup[g] || []).push(i); });
      Object.keys(byGroup).forEach((g) => {
        byGroup[g].sort((a, b) => {
          if (a.dueAt && b.dueAt) return a.dueAt.localeCompare(b.dueAt);
          if (a.dueAt) return -1;
          if (b.dueAt) return 1;
          return b.createdAt.localeCompare(a.createdAt);
        });
      });
      return order.filter((g) => byGroup[g]).map((g) => [g, byGroup[g]]);
    }

    const order = ['Today', 'Yesterday', 'This week', 'Earlier'];
    const byGroup = {};
    shown.slice().sort((a, b) => b.createdAt.localeCompare(a.createdAt)).forEach((i) => {
      const g = dayBucket(i.createdAt); (byGroup[g] = byGroup[g] || []).push(i);
    });
    return order.filter((g) => byGroup[g]).map((g) => [g, byGroup[g]]);
  }

  function metaHtml(i) {
    if (i.type === 'reminder') {
      const label = i.dueAt ? `🔔 ${window.JotEngine.formatDue(i.dueAt)}` : `${ago(i.createdAt)} · 🔔 add time`;
      return `<button class="meta duebtn" data-id="${i.id}">${label}</button>`;
    }
    return `<div class="meta">${ago(i.createdAt)}</div>`;
  }

  function itemHtml(i) {
    const t = TYPES[i.type];
    const editing = editingId === i.id;
    return `
    <div class="swipe" data-id="${i.id}">
      <div class="swipe-del"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/></svg></div>
      <div class="item ${i.done ? 'done' : ''}" style="--cbg:${t.bg}" data-id="${i.id}">
        <div class="tag" title="${t.label}">${t.icon}</div>
        <div class="body">
          ${editing
            ? `<textarea class="edittxt" rows="1">${escapeHtml(i.text)}</textarea>`
            : `<div class="txt">${escapeHtml(i.text)}</div>`}
          ${metaHtml(i)}
        </div>
        <div class="actions">
          ${i.type === 'reminder' ? `<button class="doneBtn" title="${i.done ? 'Mark not done' : 'Mark done'}">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          </button>` : ''}
        </div>
      </div>
    </div>`;
  }

  function renderList() {
    const groups = sortedGroups();
    const trashCount = items.filter((i) => i.deletedAt).length;
    const trashHtml = trashCount ? `<button class="trashlink" id="trashLink">🗑 Recently deleted (${trashCount})</button>` : '';

    if (groups.length === 0) {
      listEl.innerHTML = `<div class="empty"><b>Nothing here yet</b>${query ? 'No matches for your search.' : 'Capture your first thought from the pencil tab above.'}</div>${trashHtml}`;
    } else {
      listEl.innerHTML = groups.map(([label, arr]) => `
        <div class="grouphead">${label}</div>
        ${arr.map(itemHtml).join('')}
      `).join('') + trashHtml;
    }

    listEl.querySelectorAll('.item').forEach((el) => {
      const id = el.dataset.id;
      const doneBtn = el.querySelector('.doneBtn');
      if (doneBtn) doneBtn.addEventListener('click', (e) => { e.stopPropagation(); toggleDone(id); });
      const dueBtn = el.querySelector('.duebtn');
      if (dueBtn) dueBtn.addEventListener('click', (e) => { e.stopPropagation(); openDueSheet(id); });
      bindSwipe(el, id);

      const editEl = el.querySelector('.edittxt');
      if (editEl) {
        editEl.addEventListener('input', () => { editEl.style.height = 'auto'; editEl.style.height = editEl.scrollHeight + 'px'; });
        editEl.style.height = editEl.scrollHeight + 'px';
        editEl.focus();
        editEl.setSelectionRange(editEl.value.length, editEl.value.length);
        editEl.addEventListener('blur', () => commitEdit(id, editEl.value));
        editEl.addEventListener('keydown', (e) => {
          if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); editEl.blur(); }
          if (e.key === 'Escape') { editingId = null; renderList(); }
        });
      }
    });

    const trashLink = $('#trashLink');
    if (trashLink) trashLink.addEventListener('click', openTrash);

    if (swipeOpenId) {
      const openEl = listEl.querySelector(`.item[data-id="${swipeOpenId}"]`);
      if (openEl) openEl.style.transform = 'translateX(-84px)';
      else swipeOpenId = null;
    }
  }

  function toggleDone(id) {
    const it = items.find((i) => i.id === id);
    if (!it) return;
    it.done = !it.done;
    if (it.done) {
      const t = timers.get(id);
      if (t) { clearTimeout(t); timers.delete(id); }
    }
    save(items);
    window.JotPush && window.JotPush.syncReminder(it);
    renderList();
  }

  function startEdit(id) {
    editingId = id;
    swipeOpenId = null;
    renderList();
  }

  function commitEdit(id, text) {
    const it = items.find((i) => i.id === id);
    editingId = null;
    text = text.trim();
    if (it && text) it.text = text;
    save(items);
    if (it) window.JotPush && window.JotPush.syncReminder(it);
    renderList();
  }

  function softDelete(id) {
    const it = items.find((i) => i.id === id);
    if (!it) return;
    const timer = timers.get(id);
    if (timer) { clearTimeout(timer); timers.delete(id); }
    it.deletedAt = new Date().toISOString();
    swipeOpenId = null;
    save(items);
    window.JotPush && window.JotPush.syncReminder(it);
    render();
    showDeleteToast(id);
  }

  function showDeleteToast(id) {
    toastEl.innerHTML = `<span>🗑 Deleted</span><span class="retag" id="undoBtn">tap to undo</span>`;
    toastEl.classList.add('show');
    clearTimeout(deleteToastTimer);
    clearTimeout(toastTimer);
    const undo = () => { restoreItem(id); toastEl.classList.remove('show'); };
    toastEl.onclick = undo;
    deleteToastTimer = setTimeout(() => { toastEl.classList.remove('show'); toastEl.onclick = null; }, 3200);
  }

  function restoreItem(id) {
    const it = items.find((i) => i.id === id);
    if (it) { it.deletedAt = null; save(items); window.JotPush && window.JotPush.syncReminder(it); render(); }
  }

  function purgeDeleted(id) {
    items = items.filter((i) => i.id !== id);
    save(items);
    openTrash();
    render();
  }

  function purgeOldDeleted() {
    const cutoff = Date.now() - TRASH_DAYS * 86400000;
    const next = items.filter((i) => !i.deletedAt || new Date(i.deletedAt).getTime() > cutoff);
    if (next.length !== items.length) { items = next; save(items); }
  }

  function openTrash() {
    const deleted = items.filter((i) => i.deletedAt).sort((a, b) => b.deletedAt.localeCompare(a.deletedAt));
    const existing = document.querySelector('.modal-bg');
    if (existing) existing.remove();
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `<div class="modal">
      <div class="closebar"></div>
      <h3>Recently deleted</h3>
      <p>Kept for ${TRASH_DAYS} days, then removed for good.</p>
      ${deleted.length ? deleted.map((i) => `
        <div class="trashitem" data-id="${i.id}">
          <span>${TYPES[i.type].icon}</span>
          <span class="txt">${escapeHtml(i.text)}</span>
          <button class="restore" data-action="restore">Restore</button>
          <button class="restore" data-action="purge" style="color:var(--reminder-ink)">Delete</button>
        </div>`).join('') : '<p>Nothing here.</p>'}
    </div>`;
    document.body.appendChild(bg);
    bg.addEventListener('click', (e) => { if (e.target === bg) bg.remove(); });
    bg.querySelectorAll('[data-action="restore"]').forEach((b) => {
      b.addEventListener('click', () => { restoreItem(b.closest('.trashitem').dataset.id); bg.remove(); openTrash(); });
    });
    bg.querySelectorAll('[data-action="purge"]').forEach((b) => {
      b.addEventListener('click', () => purgeDeleted(b.closest('.trashitem').dataset.id));
    });
  }

  // ---------------- Due date/time editor ----------------
  function toLocalInputValue(iso) {
    const d = iso ? new Date(iso) : new Date(Date.now() + 3600000);
    const pad = (n) => String(n).padStart(2, '0');
    return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}T${pad(d.getHours())}:${pad(d.getMinutes())}`;
  }

  function setItemDue(id, iso) {
    const it = items.find((i) => i.id === id);
    if (!it) return;
    it.dueAt = iso;
    it.notified = false;
    const t = timers.get(id);
    if (t) { clearTimeout(t); timers.delete(id); }
    save(items);
    if (iso) scheduleNotification(it);
    window.JotPush && window.JotPush.syncReminder(it);
    render();
  }

  function openDueSheet(id) {
    const it = items.find((i) => i.id === id);
    if (!it) return;
    const existing = document.querySelector('.modal-bg');
    if (existing) existing.remove();
    const bg = document.createElement('div');
    bg.className = 'modal-bg';
    bg.innerHTML = `<div class="modal">
      <div class="closebar"></div>
      <h3>Reminder time</h3>
      <div class="field">
        <label>Due date &amp; time</label>
        <input type="datetime-local" id="dueTimeInput" value="${toLocalInputValue(it.dueAt)}">
      </div>
      <div class="modal-actions">
        <button class="btn ghost" data-action="cancel">Cancel</button>
        ${it.dueAt ? `<button class="btn ghost" data-action="clear" style="color:var(--reminder-ink)">Clear</button>` : ''}
        <button class="btn primary" data-action="save">Save</button>
      </div>
    </div>`;
    document.body.appendChild(bg);
    bg.addEventListener('click', (e) => { if (e.target === bg) bg.remove(); });
    bg.querySelector('[data-action="cancel"]').addEventListener('click', () => bg.remove());
    const clearBtn = bg.querySelector('[data-action="clear"]');
    if (clearBtn) clearBtn.addEventListener('click', () => { setItemDue(id, null); bg.remove(); });
    bg.querySelector('[data-action="save"]').addEventListener('click', () => {
      const val = bg.querySelector('#dueTimeInput').value;
      if (!val) return;
      setItemDue(id, new Date(val).toISOString());
      bg.remove();
    });
  }

  // ---------------- Swipe to delete ----------------
  function bindSwipe(el, id) {
    el.addEventListener('pointerdown', (e) => {
      if (e.target.closest('.actions') || e.target.closest('.edittxt') || e.target.closest('.duebtn')) return;
      const wasOpen = swipeOpenId === id;
      if (swipeOpenId && swipeOpenId !== id) {
        const otherEl = listEl.querySelector(`.item[data-id="${swipeOpenId}"]`);
        if (otherEl) { otherEl.style.transition = 'transform .2s'; otherEl.style.transform = 'translateX(0)'; }
        swipeOpenId = null;
      }
      swipeState = { id, el, startX: e.clientX, startY: e.clientY, dx: 0, engaged: false, wasOpen };
      el.style.transition = 'none';
      el.setPointerCapture(e.pointerId);
    });
    el.addEventListener('pointermove', (e) => {
      if (!swipeState || swipeState.id !== id) return;
      const dx = e.clientX - swipeState.startX;
      const dy = e.clientY - swipeState.startY;
      if (!swipeState.engaged) {
        if (Math.abs(dx) < 6 && Math.abs(dy) < 6) return;
        if (Math.abs(dy) > Math.abs(dx)) { swipeState = null; return; }
        swipeState.engaged = true;
      }
      const base = swipeState.wasOpen ? -84 : 0;
      swipeState.dx = Math.min(0, Math.max(-84, base + dx));
      el.style.transform = `translateX(${swipeState.dx}px)`;
    });
    const end = (e) => {
      if (!swipeState || swipeState.id !== id) return;
      const s = swipeState;
      swipeState = null;
      el.style.transition = 'transform .2s';
      if (!s.engaged) {
        const dx = Math.abs((e.clientX || 0) - s.startX);
        const dy = Math.abs((e.clientY || 0) - s.startY);
        if (dx < 6 && dy < 6) {
          if (s.wasOpen) { el.style.transform = 'translateX(0)'; swipeOpenId = null; }
          else startEdit(id);
        }
        return;
      }
      if (s.dx < -42) { el.style.transform = 'translateX(-84px)'; swipeOpenId = id; }
      else { el.style.transform = 'translateX(0)'; swipeOpenId = null; }
    };
    el.addEventListener('pointerup', end);
    el.addEventListener('pointercancel', end);
    const wrap = el.parentElement;
    const delZone = wrap && wrap.querySelector('.swipe-del');
    if (delZone) delZone.addEventListener('click', () => softDelete(id));
  }

  function render() {
    renderFilters();
    renderList();
  }

  searchEl.addEventListener('input', (e) => { query = e.target.value; renderList(); });

  // ---------------- Notifications ----------------
  let deniedToastShown = false;
  function showDeniedToast() {
    if (deniedToastShown) return;
    deniedToastShown = true;
    toastEl.onclick = null;
    toastEl.innerHTML = `<span>🔕 Notifications are blocked — enable them in Settings to get reminder alerts</span>`;
    toastEl.classList.add('show');
    clearTimeout(toastTimer);
    clearTimeout(deleteToastTimer);
    toastTimer = setTimeout(() => toastEl.classList.remove('show'), 4000);
  }

  function notifyNow(item, missed) {
    if (item.done || item.deletedAt) return; // stale timer fired after done/delete/retag
    const body = missed ? `Missed reminder: ${item.text}` : item.text;
    const granted = typeof Notification !== 'undefined' && Notification.permission === 'granted';
    if ('serviceWorker' in navigator && granted) {
      navigator.serviceWorker.ready.then((reg) => reg.showNotification('Jot ⏰', { body, tag: item.id, icon: './icons/icon-192.png' })).catch(() => {});
    }
    // Only claim "notified" when we actually showed a local notification —
    // otherwise this silently eats the reminder and the push backend (which
    // checks the synced `notified` flag) never gets a chance to fire instead.
    if (granted) {
      item.notified = true;
      save(items);
    }
    window.JotPush && window.JotPush.syncReminder(item);
  }

  function scheduleNotification(item) {
    if (!item.dueAt || item.done || item.notified) return;
    const delta = new Date(item.dueAt).getTime() - Date.now();
    if (delta <= 0) { notifyNow(item, true); return; }
    if (typeof Notification !== 'undefined') {
      if (Notification.permission === 'default') {
        Notification.requestPermission().then((p) => {
          if (p === 'granted') window.JotPush && window.JotPush.ensureSubscribed();
          else if (p === 'denied') showDeniedToast();
        });
      } else if (Notification.permission === 'denied') {
        showDeniedToast();
      }
    }
    const existing = timers.get(item.id);
    if (existing) clearTimeout(existing);
    if (delta < 2147483647) {
      timers.set(item.id, setTimeout(() => notifyNow(item, false), delta));
    }
  }

  function sweepReminders() {
    items.filter((i) => i.type === 'reminder' && i.dueAt && !i.done && !i.notified && !i.deletedAt).forEach((i) => {
      const delta = new Date(i.dueAt).getTime() - Date.now();
      if (delta <= 0) notifyNow(i, true);
      else scheduleNotification(i);
    });
  }

  document.addEventListener('visibilitychange', () => { if (document.visibilityState === 'visible') sweepReminders(); });
  setInterval(sweepReminders, 60000);

  // ---------------- Sync UI wiring ----------------
  window.addEventListener('jot:external-update', (e) => {
    items = e.detail || [];
    render();
    sweepReminders();
  });

  const syncBtn = $('#syncBtn');
  syncBtn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17.5 19H9a7 7 0 1 1 6.71-9h.79a4.5 4.5 0 1 1 0 9Z"/></svg>`;
  syncBtn.addEventListener('click', () => window.JotSync && window.JotSync.openPanel());

  if (window.JotSync) {
    window.JotSync.init({
      getItems: () => items,
      setItems: (next) => { items = next; render(); sweepReminders(); },
      onStatus: (s) => {
        syncBtn.classList.toggle('on', s.state === 'idle' && s.enabled);
        syncBtn.title = s.enabled ? (s.state === 'syncing' ? 'Syncing…' : 'Synced') : 'Cross-device sync (off)';
      },
    });
  }

  purgeOldDeleted();
  rollPrompt();
  render();
  sweepReminders();
  window.JotPush && window.JotPush.ensureSubscribed();
  setTimeout(() => input.focus(), 200);

  if ('serviceWorker' in navigator) {
    let refreshed = false;
    navigator.serviceWorker.addEventListener('controllerchange', () => {
      if (refreshed) return;
      refreshed = true;
      window.location.reload();
    });

    window.addEventListener('load', () => {
      navigator.serviceWorker.register('./sw.js').then((reg) => {
        reg.update();
        setInterval(() => reg.update(), 60000);
      }).catch(() => {});
    });

    document.addEventListener('visibilitychange', () => {
      if (document.visibilityState === 'visible') {
        navigator.serviceWorker.getRegistration().then((reg) => reg && reg.update());
      }
    });
  }
})();
</script>
</body>
</html>
